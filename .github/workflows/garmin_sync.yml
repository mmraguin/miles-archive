name: Garmin Sync

on:
  schedule:
    - cron: '0 6 * * *'    # 6am UTC = 2pm Manila
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to sync (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure git
        run: |
          git config user.name "garmin-sync[bot]"
          git config user.email "garmin-sync@noreply"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install garth garminconnect

      - name: Restore Garmin session from secret
        run: |
          mkdir -p ~/.garth
          python3 - <<'EOF'
          import base64, json, pathlib, os
          raw = os.environ["GARTH_SESSION"]
          files = json.loads(base64.b64decode(raw).decode())
          for name, content in files.items():
              (pathlib.Path.home() / ".garth" / name).write_bytes(base64.b64decode(content))
          print("Session restored.")
          EOF
        env:
          GARTH_SESSION: ${{ secrets.GARTH_SESSION }}

      - name: Run sync
        env:
          SYNC_DATE: ${{ github.event.inputs.date }}
        run: python garmin_sync.py

      - name: Commit and push
        run: |
          git add journal/daily/
          git diff --staged --quiet && echo "Nothing to commit." && exit 0
          git commit -m "garmin sync $(date -u +%Y-%m-%d)"
          git push
