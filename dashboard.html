<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Archive — Dashboard</title>
<link rel="stylesheet" href="miles-archive.css">
</head>
<body>
<div class="constellation" id="stars"></div>
<div id="dash-app">

  <div id="dash-header">
    <div id="wordmark">
      <div id="wm-main">Archive</div>
      <div id="wm-date"></div>
    </div>
    <div id="dash-nav">
      <a class="nav-dash" href="index.html">← chat</a>
      <button class="nav-more" id="dash-refresh-btn" onclick="dashRefresh()">refresh</button>
    </div>
  </div>

  <div class="rule"></div>
  <div id="dash-content"></div>

</div>
<script src="miles-archive.js"></script>
<script>initDash();</script>
<script>
(function(){
  var c = document.getElementById('stars');
  for (var i = 0; i < 200; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    s.style.left = (Math.random() * 100) + '%';
    s.style.top  = (Math.random() * 100) + '%';
    s.style.animationDelay    = (Math.random() * 6) + 's';
    s.style.animationDuration = (4 + Math.random() * 5) + 's';
    c.appendChild(s);
  }
})();
</script>
</body>
</html>
